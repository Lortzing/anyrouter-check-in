name: Apply email notification update

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-email-notification-change.yml

permissions:
  contents: write

jobs:
  apply-change:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch notification behavior
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('checkin.py')
          text = path.read_text(encoding='utf-8')

          replacements = [
              (
                  "import asyncio\nimport hashlib",
                  "import asyncio\nimport builtins\nimport hashlib",
              ),
              (
                  "import sys\nfrom datetime import datetime",
                  "import sys\nfrom contextlib import contextmanager\nfrom datetime import datetime",
              ),
              (
                  "\n\nasync def check_in_account(account: AccountConfig, account_index: int, app_config: AppConfig):",
                  '''\n\n@contextmanager
def capture_failure_messages():
\t"""捕获失败日志，同时保留 GitHub Actions 中的原始输出。"""
\tmessages: list[str] = []
\toriginal_print = builtins.print

\tdef capturing_print(*args, **kwargs):
\t\ttext = ' '.join(str(arg) for arg in args)
\t\toriginal_print(*args, **kwargs)
\t\tif '[FAILED]' in text:
\t\t\tmessages.append(text)

\tbuiltins.print = capturing_print
\ttry:
\t\tyield messages
\tfinally:
\t\tbuiltins.print = original_print


def get_account_failure_reason(account_name: str, messages: list[str]) -> str:
\t"""提取当前账号最后一条具体失败原因。"""
\tprefix = f'[FAILED] {account_name}:'
\tfor message in reversed(messages):
\t\tif message.startswith(prefix):
\t\t\treturn message[len(prefix) :].strip()

\tif messages:
\t\treturn messages[-1].replace('[FAILED]', '', 1).strip()
\treturn '未知错误，请查看 GitHub Actions 日志'


async def check_in_account(account: AccountConfig, account_index: int, app_config: AppConfig):''',
              ),
              (
                  "\t\ttry:\n\t\t\tsuccess, user_info_before, user_info_after = await check_in_account(account, i, app_config)",
                  "\t\ttry:\n\t\t\twith capture_failure_messages() as failure_messages:\n\t\t\t\tsuccess, user_info_before, user_info_after = await check_in_account(account, i, app_config)",
              ),
              (
                  '''\t\t\tif should_notify_this_account:
\t\t\t\taccount_name = account.get_display_name(i)
\t\t\t\tstatus = '[SUCCESS]' if success else '[FAIL]'
\t\t\t\taccount_result = f'{status} {account_name}'
\t\t\t\tif user_info_after and user_info_after.get('success'):
\t\t\t\t\taccount_result += f'\\n{user_info_after["display"]}'
\t\t\t\telif user_info_after:
\t\t\t\t\taccount_result += f'\\n{user_info_after.get("error", "Unknown error")}'
\t\t\t\tnotification_content.append(account_result)''',
                  '''\t\t\tif should_notify_this_account:
\t\t\t\taccount_name = account.get_display_name(i)
\t\t\t\tfailure_reason = get_account_failure_reason(account_name, failure_messages)
\t\t\t\tnotification_content.append(f'[失败] {account_name}\\n错误：{failure_reason}')''',
              ),
              (
                  "\t\t\tnotification_content.append(f'[FAIL] {account_name} exception: {str(e)[:50]}...')",
                  "\t\t\tnotification_content.append(f'[失败] {account_name}\\n错误：处理异常：{str(e)[:200]}')",
              ),
              (
                  "\t\tnotify.push_message('AnyRouter Check-in Alert', notify_content, msg_type='text')",
                  "\t\tnotify.push_message(f'AnyRouter 签到：成功 {success_count}/{total_count}', notify_content, msg_type='text')",
              ),
              (
                  "\t\tnotify.push_message('AnyRouter Check-in Alert', error_msg, msg_type='text')",
                  "\t\tnotify.push_message('AnyRouter 签到：成功 0/0', error_msg, msg_type='text')",
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'Expected exactly one match, found {count}: {old[:80]!r}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY

          cat > AGENTS.md <<'EOF'
          # Project Agent Rules

          - Work from the repository root and read this file before modifying the project.
          - Use the project-local `uv` environment for Python commands and dependencies.
          - Preserve existing check-in behavior unless a task explicitly requires logic changes.
          - Keep notification errors account-specific and retain detailed failures in GitHub Actions logs.
          - Run at least a syntax check or relevant tests after code changes.
          - Update this file when project-wide development rules change.
          EOF

          python -m py_compile checkin.py

      - name: Commit changes
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add checkin.py AGENTS.md
          git rm .github/workflows/apply-email-notification-change.yml
          git commit -m "feat: improve Chinese email notifications"
          git push origin HEAD:main
